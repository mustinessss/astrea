<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Астрея - Система судейства фехтования</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); max-width: 400px; width: 100%; text-align: center; }
        h1 { color: #333; margin-bottom: 30px; font-size: 28px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
        input[type="password"] { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; transition: border-color 0.3s; }
        input[type="password"]:focus { border-color: #667eea; outline: none; }
        .buttons { display: flex; gap: 10px; margin-top: 25px; }
        button { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: all 0.3s; flex: 1; }
        .btn-login { background-color: #667eea; color: white; }
        .btn-login:hover { background-color: #5a6fd8; transform: translateY(-2px); }
        .btn-guest { background-color: #6c757d; color: white; }
        .btn-guest:hover { background-color: #5a6268; transform: translateY(-2px); }
        .error { color: #dc3545; background: #f8d7da; padding: 10px; border-radius: 5px; margin-bottom: 20px; border: 1px solid #f5c6cb; }
        .subtitle { color: #666; font-size: 14px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Астрея</h1>
        <p class="subtitle">Система судейства фехтования</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post" action="/login">
            <div class="form-group">
                <label for="password">Пароль:</label>
                <input type="password" id="password" name="password" placeholder="Введите пароль" required>
            </div>

            <div class="buttons">
                <button type="submit" class="btn-login">Войти</button>
                <button type="button" class="btn-guest" onclick="window.location.href='/dashboard'">Войти без пароля</button>
            </div>
        </form>
    </div>
</body>
</html>
